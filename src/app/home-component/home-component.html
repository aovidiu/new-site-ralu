<div class="featured">
   
    <div class="featured-text">
      <div class="featured-title">
        {{Titlul_Pagina}}
      </div>      
      <div>
        <div class="text-container">
          <div class="half">
            <img src="assets/images/raluca.jpg" alt="raluca" class="float-left">
            @for (paragraf of RalucaParagrafe; track $index) {
              <p>
                {{paragraf}}
              </p>
            }
          </div>
          <div class="half">
            <img src="assets/images/ana.jpg" alt="ana" class="float-right">
            @for (paragraf of AnaParagrafe; track $index) {
              <p>
                {{paragraf}}
              </p>
            }
          </div>
        </div>
      </div>
    </div>
    
</div>
<div id="articles" class="article">
  @for (article of Articles; track $index) {
    <div class="article-item">
      <img class="article-img" src="assets/images/cursuri.png" alt="articol">
      <h3>{{article.title}}</h3>
      <p>
        {{article.summary}}
      </p>
      <a class="article-read-more" [routerLink]="article.route">{{Citeste_Mai_Mult}}</a>
    </div>
  }
</div>
