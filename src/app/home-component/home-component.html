<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "LocalBusiness",
  "name": "Cabinet Psihologie",
  "description": "Cabinet de psihologie din București specializat în terapie cognitiv-comportamentală, cursuri de dezvoltare personală și consiliere psihologică",
  "url": "https://raluca-psihologie.github.io/new-site-ralu/",
  "logo": "https://raluca-psihologie.github.io/new-site-ralu/assets/images/logo.png",
  "image": "https://raluca-psihologie.github.io/new-site-ralu/assets/images/logo.png",
  "telephone": "",
  "address": {
    "@type": "PostalAddress",
    "addressLocality": "București",
    "addressCountry": "RO"
  },
  "geo": {
    "@type": "GeoCoordinates",
    "latitude": "44.4268",
    "longitude": "26.1025"
  },
  "areaServed": {
    "@type": "City",
    "name": "București"
  },
  "sameAs": [],
  "contactPoint": {
    "@type": "ContactPoint",
    "telephone": "",
    "contactType": "customer service",
    "url": "https://raluca-psihologie.github.io/new-site-ralu/send-message",
    "availableLanguage": "Romanian"
  },
  "offers": [
    {
      "@type": "Service",
      "name": "Psihoterapie cognitiv-comportamentală București",
      "description": "Ședințe de terapie pentru depășirea dificultăților emoționale în București"
    },
    {
      "@type": "Service",
      "name": "Cursuri dezvoltare personală București",
      "description": "Cursuri online pentru managementul stresului și îmbunătățirea relațiilor, disponibile în București"
    }
  ],
  "priceRange": "$$",
  "paymentAccepted": "Cash, Credit Card",
  "currenciesAccepted": "RON"
}
</script>

<div class="featured">
   
    <div class="featured-text">
      <div class="featured-title">
        {{Titlul_Pagina}}
      </div>      
      <div>
        <div class="text-container">
          <div class="half">
            <img src="assets/images/raluca.jpg" alt="raluca" class="float-left">
            @for (paragraf of RalucaParagrafe; track $index) {
              <p>
                {{paragraf}}
              </p>
            }
          </div>
          <div class="half">
            <img src="assets/images/ana.jpg" alt="ana" class="float-right">
            @for (paragraf of AnaParagrafe; track $index) {
              <p>
                {{paragraf}}
              </p>
            }
          </div>
        </div>
      </div>
    </div>
    
</div>
<div id="articles" class="article">
  @for (article of Articles; track $index) {
    <div class="article-item">
      <img class="article-img" [src]="article.imageIcon || 'assets/images/cursuri.png'" [alt]="article.imageAlt || article.title">
      <h3>{{article.title}}</h3>
      <p>
        {{article.summary}}
      </p>
      <a class="article-read-more" [routerLink]="article.route">{{Citeste_Mai_Mult}}</a>
    </div>
  }
</div>
